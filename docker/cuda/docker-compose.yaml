name: tvd

services:
  postgres:
    image: postgres:18.4-bookworm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    volumes:
      - ./volumes/postgres:/var/lib/postgresql

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: true
    volumes:
      - ./volumes/rustfs/data:/data
      - ./volumes/rustfs/logs:/logs

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    image: traffic-violation-detection:web
    depends_on:
      - server-cuda
    ports:
      - "80:80"
    volumes:
      - ./volumes/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  server-cuda:
    build:
      context: ../../server
      dockerfile: Dockerfile
    image: traffic-violation-detection:cuda
    depends_on:
      - postgres
      - rustfs
    ports:
      - "4321:4321"
    volumes:
      # 模型权重：不设置路径时自动从 ModelScope 下载
      - ./volumes/models:/app/models
      # 日志持久化（可选）
      - ./volumes/logs:/app/logs
      # YOLO 配置持久化
      - ./volumes/configs:/app/configs
    environment:
      # ── 运行模式 ──
      - IS_DEV=${IS_DEV:-false}
      # ── 检测模块 ──
      - YOLO_MODEL_PATH=/app/models/v1.pt
      - YOLO_CONF_THRESHOLD=${YOLO_CONF_THRESHOLD:-0.4}
      - YOLO_DEVICE=${YOLO_DEVICE:-cuda}
      # ── 数据库 ──
      - POSTGRES_SERVER=${POSTGRES_SERVER:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-test}
      # ── 对象存储 (S3 兼容) ──
      - S3_SERVER=${S3_SERVER:-rustfs}
      - S3_PORT=${S3_PORT:-9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-rustfsadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-rustfsadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-traffic}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT:-}
      - S3_PRESIGNED_EXPIRES=${S3_PRESIGNED_EXPIRES:-600}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/v1/health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
