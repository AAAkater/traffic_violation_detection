services:
  traffic-violation-detection:
    build:
      context: ../..
      dockerfile: docker/cuda/Dockerfile
    image: traffic-violation-detection:cuda
    container_name: tvd-cuda
    ports:
      - "4321:4321"
    volumes:
      # жЊ‚иЅЅжЁЎећ‹жќѓй‡Ќз›®еЅ•пј€YOLO жЁЎећ‹з­‰пј‰
      - ../../models:/app/models
    environment:
      # в”Ђв”Ђ жЈЂжµ‹жЁЎеќ— в”Ђв”Ђ
      - YOLO_MODEL_PATH=${YOLO_MODEL_PATH:-/app/models/YOLO26/best.pt}
      - YOLO_CONF_THRESHOLD=${YOLO_CONF_THRESHOLD:-0.4}
      - YOLO_DEVICE=${YOLO_DEVICE:-cuda}
      # в”Ђв”Ђ е€¤е®љжЁЎеќ— в”Ђв”Ђ
      - JUDGE_MODEL=${JUDGE_MODEL:-qwen3.7-plus}
      - JUDGE_BASE_URL=${JUDGE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - JUDGE_API_KEY=${JUDGE_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
