name: tvd

services:
  server-cuda:
    build:
      context: ../../server
      dockerfile: ../docker/cuda/Dockerfile
    image: traffic-violation-detection:cuda
    ports:
      - "4321:4321"
    volumes:
      # 模型权重：放到旁边的 volume/models/ 目录，启动时自动挂载
      - ./volume/models:/app/models
      # 日志持久化（可选）
      - ./volume/logs:/app/logs
      # YOLO 配置持久化
      - ./volume/configs:/app/configs
    environment:
      # ── 检测模块 ──
      - YOLO_MODEL_PATH=/app/models/v1.pt
      - YOLO_CONF_THRESHOLD=${YOLO_CONF_THRESHOLD:-0.4}
      - YOLO_DEVICE=${YOLO_DEVICE:-cuda}
      # ── 判定模块 ──
      - JUDGE_MODEL=${JUDGE_MODEL:-qwen3.7-plus}
      - JUDGE_BASE_URL=${JUDGE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - JUDGE_API_KEY=${JUDGE_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/v1/health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
