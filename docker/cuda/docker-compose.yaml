name: tvd

services:
  db-postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-tvd}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tvd123}
      POSTGRES_DB: ${DB_NAME:-tvd}
    volumes:
      - ./volumes/db:/var/lib/postgresql

  s3-rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-tvd}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-tvd123}
      RUSTFS_CONSOLE_ENABLE: true
    volumes:
      - ./volumes/s3:/data

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    image: traffic-violation-detection:web
    depends_on:
      - server-cuda
    ports:
      - "80:80"
    volumes:
      - ./volumes/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  server-cuda:
    build:
      context: ../../server
      dockerfile: Dockerfile
    image: traffic-violation-detection:cuda
    depends_on:
      - db-postgres
      - s3-rustfs
    ports:
      - "${SYSTEM_PORT:-8010}:4321"
    volumes:
      # 模型权重：不设置路径时自动从 ModelScope 下载
      - ./volumes/server/models:/app/models
      # 日志持久化（可选）
      - ./volumes/server/logs:/app/logs
      # YOLO 配置持久化
      - ./volumes/server/configs:/app/configs
    environment:
      # ── 运行模式 ──
      IS_DEV: ${IS_DEV:-false}
      # ── 检测模块 ──
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-/app/models/v1.pt}
      YOLO_CONF_THRESHOLD: ${YOLO_CONF_THRESHOLD:-0.4}
      YOLO_DEVICE: ${YOLO_DEVICE:-cuda}
      # ── 数据库 ──
      DB_SERVER: ${DB_SERVER:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-test}
      # ── 对象存储 (S3 兼容) ──
      S3_SERVER: ${S3_SERVER:-rustfs}
      S3_PORT: ${S3_PORT:-9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-traffic}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_PRESIGNED_EXPIRES: ${S3_PRESIGNED_EXPIRES:-600}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/v1/health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
